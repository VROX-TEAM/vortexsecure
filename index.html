<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>CyberSec Academy · أكاديمية الأمن السيبراني</title>
  
  <script>
    window.tailwind = {
      config: {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              neon: '#0f0',
              darkBg: '#0a0f0f',
              lightBg: '#f8fafc',
            },
            animation: {
              'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
              'pulse-glow': 'pulseGlow 2s infinite',
            },
            keyframes: {
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              pulseGlow: {
                '0%, 100%': { boxShadow: '0 0 8px #00ff00aa' },
                '50%': { boxShadow: '0 0 20px #00ff00ff' },
              },
            },
          }
        }
      }
    }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.24.5/babel.min.js" crossorigin></script>
  
  <style>
    .text-glow {
      text-shadow: 0 0 8px #00ff00aa, 0 0 20px #00ff0066;
    }
    .dark .text-glow {
      text-shadow: 0 0 12px #00ff00cc, 0 0 30px #00ff0088;
    }
    .border-glow {
      box-shadow: 0 0 10px #00ff0040;
    }
    .dark .border-glow {
      box-shadow: 0 0 15px #00ff0060;
    }
    .animate-on-scroll {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .animate-on-scroll.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body class="transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ---- المحتوى بالعربية والإنجليزية ----
    const content = {
      en: {
        siteTitle: "CYBERSEC ACADEMY",
        welcome: "Welcome, ",
        enterName: "What's your name?",
        placeholder: "Enter your hacker alias...",
        submit: "Join the Grid",
        discord: "Join Discord",
        sec1: {
          title: "Ethical Hacking Fundamentals",
          subtitle: "White Hat vs Black Hat",
          p1: "Ethical hacking involves legally probing systems for vulnerabilities to strengthen security. Unlike malicious black hat hackers who exploit flaws for personal gain, white hat hackers work with authorization to identify and patch weaknesses before they can be misused.",
          p2: "White Hats follow a strict code of ethics and obtain written permission before testing. Black Hats operate illegally, often causing data breaches, financial loss, and reputational damage. Gray Hats fall somewhere in between, sometimes exposing vulnerabilities without authorization but without malicious intent.",
          p3: "Common methodologies include reconnaissance, scanning, gaining access, maintaining access, and covering tracks—mirroring actual attack patterns to ensure robust defense."
        },
        sec2: {
          title: "Vulnerability Analysis",
          subtitle: "CVEs, Payloads & Injection Techniques",
          p1: "Common Vulnerabilities and Exposures (CVEs) provide a standardized identifier for publicly known security flaws. Each CVE details the affected software, severity, and potential impact, enabling security teams to prioritize patching.",
          p2: "Payloads are pieces of code executed after exploiting a vulnerability. Examples include reverse shells that connect back to an attacker, or bind shells that open a port on the target. Crafting payloads requires understanding of assembly, system calls, and evasion techniques.",
          p3: "Injection attacks exploit improper input validation. SQL injection (SQLi) manipulates database queries to extract or modify data. Cross-site scripting (XSS) injects malicious scripts into web pages. Command injection executes arbitrary OS commands on the server."
        },
        sec3: {
          title: "Game Security Engineering",
          subtitle: "Anti-Cheat, Validation & Memory Protection",
          p1: "Anti-cheat systems employ kernel-mode drivers to monitor game memory and system calls. Signature scanning detects known cheat patterns, while heuristic analysis identifies suspicious behavior like abnormal memory writes or speed hacks.",
          p2: "Client-server validation ensures critical game logic runs on the authoritative server. Player movements, item pickups, and hit detection are verified server-side to prevent tampering. Any discrepancy results in rollbacks or disconnection.",
          p3: "Memory protection thwarts reverse engineering. Techniques include packing, obfuscation, anti-debugging traps, and integrity checks that detect code patches. Virtualization and code encryption add layers of defense against cheat developers."
        },
        sec4: {
          title: "Arsenal Guide",
          subtitle: "Must‑Have Tools for Ethical Hackers",
          items: [
            "Nmap – Network mapper for host discovery and port scanning.",
            "Wireshark – Network protocol analyzer for deep packet inspection.",
            "Burp Suite – Web application security testing platform.",
            "Metasploit – Exploitation framework with extensive payload database.",
            "IDA Pro / Ghidra – Interactive disassembler and reverse engineering suites.",
            "Cheat Engine – Memory scanner and debugger for game hacking analysis."
          ]
        },
        sec5: {
          title: "Advanced Cyber Operations",
          subtitle: "OSINT, Reverse Engineering & Cryptography",
          p1: "Open Source Intelligence (OSINT) gathers publicly available data from social media, domain records, and public databases to profile targets and identify attack surfaces without direct interaction.",
          p2: "Reverse engineering dissects binaries to understand proprietary protocols, uncover hidden vulnerabilities, and develop bypasses. Tools like Ghidra and x64dbg reveal the inner workings of malware and anti-cheat systems.",
          p3: "Cryptography underpins secure communication. Ethical hackers must understand encryption algorithms (AES, RSA), hashing (SHA-256), and common implementation flaws like weak keys, padding oracle attacks, and side-channel leakage."
        }
      },
      ar: {
        siteTitle: "أكاديمية الأمن السيبراني",
        welcome: "أهلاً، ",
        enterName: "ما اسمك؟",
        placeholder: "أدخل اسمك المستعار...",
        submit: "انضم للشبكة",
        discord: "انضم لديسكورد",
        sec1: {
          title: "أساسيات الاختراق الأخلاقي",
          subtitle: "القبعة البيضاء مقابل القبعة السوداء",
          p1: "يتضمن الاختراق الأخلاقي فحص الأنظمة بشكل قانوني لاكتشاف الثغرات وتعزيز الأمان. على عكس قراصنة القبعة السوداء الخبيثين الذين يستغلون العيوب لتحقيق مكاسب شخصية، يعمل قراصنة القبعة البيضاء بترخيص لتحديد الثغرات وإصلاحها قبل استغلالها.",
          p2: "يلتزم أصحاب القبعة البيضاء بمدونة أخلاقية صارمة ويحصلون على إذن كتابي قبل الاختبار. يعمل أصحاب القبعة السوداء بشكل غير قانوني، مما يؤدي غالبًا إلى خروقات بيانات وخسائر مالية وأضرار بالسمعة. يقع أصحاب القبعة الرمادية في منطقة وسطى، حيث يكشفون أحيانًا ثغرات دون ترخيص لكن دون نية خبيثة.",
          p3: "تشمل المنهجيات الشائعة الاستطلاع، والمسح، والوصول، والحفاظ على الوصول، وإخفاء الآثار - مما يحاكي أنماط الهجوم الفعلية لضمان دفاع قوي."
        },
        sec2: {
          title: "تحليل الثغرات",
          subtitle: "CVEs والحمولات وأساليب الحقن",
          p1: "توفر الثغرات المكشوفة والمُعرّفة (CVE) معرفًا موحدًا للعيوب الأمنية المعروفة. يوضح كل CVE البرنامج المتأثر ومدى الخطورة والتأثير المحتمل، مما يساعد فرق الأمان في تحديد أولويات التحديثات.",
          p2: "الحمولات هي أكواد تُنفذ بعد استغلال الثغرة. تشمل الأمثلة الصدفة العكسية التي تتصل بالمهاجم، أو الصدفة المرتبطة التي تفتح منفذًا على الهدف. يتطلب تصميم الحمولات فهم لغة التجميع واستدعاءات النظام وتقنيات التهرب.",
          p3: "تستغل هجمات الحقن ضعف التحقق من المدخلات. يتلاعب حقن SQL (SQLi) باستعلامات قاعدة البيانات لاستخراج البيانات أو تعديلها. يقوم حقن السكربتات عبر المواقع (XSS) بحقن نصوص خبيثة في صفحات الويب. ينفذ حقن الأوامر أوامر نظام التشغيل على الخادم."
        },
        sec3: {
          title: "هندسة أمن الألعاب",
          subtitle: "مكافحة الغش والتحقق وحماية الذاكرة",
          p1: "تستخدم أنظمة مكافحة الغش برامج تشغيل على مستوى النواة لمراقبة ذاكرة اللعبة واستدعاءات النظام. يكتشف المسح بالتوقيع أنماط الغش المعروفة، بينما يحلل التحليل الإرشادي السلوك المشبوه مثل الكتابة غير الطبيعية على الذاكرة أو تسريع السرعة.",
          p2: "يضمن التحقق بين العميل والخادم تشغيل منطق اللعبة الحاسم على الخادم الموثوق. يتم التحقق من تحركات اللاعبين وجمع العناصر واكتشاف الإصابة من جانب الخادم لمنع التلاعب. يؤدي أي اختلاف إلى التراجع أو قطع الاتصال.",
          p3: "تتصدى حماية الذاكرة للهندسة العكسية. تشمل التقنيات الحزم والتشويش وفخاخ مكافحة التصحيح وفحوصات السلامة التي تكتشف تعديل الكود. تضيف الطبقات مثل المحاكاة الافتراضية وتشفير الكود دفاعات إضافية ضد مطوري الغش."
        },
        sec4: {
          title: "دليل الأدوات",
          subtitle: "الأدوات الأساسية للقراصنة الأخلاقيين",
          items: [
            "Nmap – ماسح شبكات لاكتشاف الأجهزة وفحص المنافذ.",
            "Wireshark – محلل بروتوكولات الشبكة للفحص العميق للحزم.",
            "Burp Suite – منصة اختبار أمان تطبيقات الويب.",
            "Metasploit – إطار عمل للاستغلال مع قاعدة بيانات حمولات واسعة.",
            "IDA Pro / Ghidra – أدوات فك التجميع والهندسة العكسية التفاعلية.",
            "Cheat Engine – ماسح ذاكرة ومصحح لتحليل قرصنة الألعاب."
          ]
        },
        sec5: {
          title: "العمليات السيبرانية المتقدمة",
          subtitle: "الاستخبارات مفتوحة المصدر والهندسة العكسية والتشفير",
          p1: "تجمع استخبارات المصادر المفتوحة (OSINT) البيانات المتاحة للعموم من وسائل التواصل الاجتماعي وسجلات النطاقات وقواعد البيانات العامة لتصنيف الأهداف وتحديد أسطح الهجوم دون تفاعل مباشر.",
          p2: "تقوم الهندسة العكسية بتفكيك البرامج الثنائية لفهم البروتوكولات الاحتكارية وكشف الثغرات الخفية وتطوير التجاوزات. تكشف أدوات مثل Ghidra وx64dbg الأعمال الداخلية للبرمجيات الخبيثة وأنظمة مكافحة الغش.",
          p3: "يدعم التشفير الاتصالات الآمنة. يجب على القراصنة الأخلاقيين فهم خوارزميات التشفير (AES, RSA)، والتجزئة (SHA-256)، وعيوب التنفيذ الشائعة مثل المفاتيح الضعيفة، وهجمات padding oracle، وتسرب القنوات الجانبية."
        }
      }
    };

    // مكون البطاقة مع تأثيرات حركية
    function Section({ title, subtitle, darkMode, children, index }) {
      const ref = useRef(null);
      const [isVisible, setIsVisible] = useState(false);

      useEffect(() => {
        const observer = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setIsVisible(true);
              observer.unobserve(entry.target);
            }
          },
          { threshold: 0.1 }
        );
        if (ref.current) observer.observe(ref.current);
        return () => { if (ref.current) observer.unobserve(ref.current); };
      }, []);

      return (
        <section
          ref={ref}
          className={`rounded-2xl p-5 border transition-all duration-500 transform ${
            darkMode 
              ? 'bg-gray-900 border-green-500/40 border-glow' 
              : 'bg-white border-green-600/30 shadow-md'
          } hover:scale-[1.02] hover:shadow-2xl ${isVisible ? 'animate-fade-in-up' : 'opacity-0'}`}
          style={{ animationDelay: `${index * 0.1}s` }}
        >
          <h2 className={`text-xl sm:text-2xl font-bold mb-1 ${darkMode ? 'text-green-400 text-glow' : 'text-green-700'}`}>
            {title}
          </h2>
          <h3 className={`text-sm sm:text-base font-medium mb-4 ${darkMode ? 'text-green-300/70' : 'text-green-600'}`}>
            {subtitle}
          </h3>
          <div className={`text-sm sm:text-base leading-relaxed ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>
            {children}
          </div>
        </section>
      );
    }

    // نافذة الترحيب
    function WelcomeModal({ darkMode, lang, onNameSubmit }) {
      const [name, setName] = useState('');
      const t = content[lang];

      const handleSubmit = (e) => {
        e.preventDefault();
        if (name.trim()) {
          onNameSubmit(name.trim());
        }
      };

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/70 backdrop-blur-sm">
          <div className={`w-11/12 max-w-sm p-6 rounded-2xl border animate-fade-in-up ${
            darkMode ? 'bg-gray-900 border-green-500/50' : 'bg-white border-green-600/50'
          }`}>
            <h2 className={`text-xl font-bold mb-4 ${darkMode ? 'text-green-400' : 'text-green-700'}`}>
              {t.enterName}
            </h2>
            <form onSubmit={handleSubmit} className="space-y-4">
              <input
                type="text"
                value={name}
                onChange={(e) => setName(e.target.value)}
                placeholder={t.placeholder}
                className={`w-full p-3 rounded-lg border focus:outline-none focus:ring-2 focus:ring-green-500 ${
                  darkMode ? 'bg-gray-800 border-gray-600 text-white' : 'bg-gray-100 border-gray-300 text-gray-900'
                }`}
                autoFocus
              />
              <button
                type="submit"
                className="w-full py-2 bg-green-500 hover:bg-green-600 text-black font-bold rounded-lg transition-colors"
              >
                {t.submit}
              </button>
            </form>
          </div>
        </div>
      );
    }

    // التطبيق الرئيسي
    function App() {
      const [darkMode, setDarkMode] = useState(true);
      const [lang, setLang] = useState('en');
      const [userName, setUserName] = useState(() => localStorage.getItem('cyberac_user') || '');
      const [showWelcome, setShowWelcome] = useState(!userName);

      useEffect(() => {
        const html = document.documentElement;
        if (darkMode) {
          html.classList.add('dark');
        } else {
          html.classList.remove('dark');
        }
        html.dir = lang === 'ar' ? 'rtl' : 'ltr';
        html.lang = lang;
      }, [darkMode, lang]);

      const handleNameSubmit = useCallback((name) => {
        setUserName(name);
        localStorage.setItem('cyberac_user', name);
        setShowWelcome(false);
      }, []);

      const t = content[lang];
      const sections = [t.sec1, t.sec2, t.sec3, t.sec4, t.sec5];

      return (
        <div className={`min-h-screen flex flex-col ${darkMode ? 'bg-gray-950 text-gray-100' : 'bg-gray-50 text-gray-800'} transition-colors duration-300`}>
          {showWelcome && (
            <WelcomeModal darkMode={darkMode} lang={lang} onNameSubmit={handleNameSubmit} />
          )}
          
          <header className={`sticky top-0 z-50 backdrop-blur-md border-b ${darkMode ? 'bg-gray-900/80 border-green-500/30' : 'bg-white/80 border-green-600/20'} px-4 py-3 flex items-center justify-between`}>
            <div className="flex items-center gap-3">
              <h1 className={`text-lg sm:text-2xl font-extrabold tracking-widest ${darkMode ? 'text-green-400 text-glow' : 'text-green-700'}`}>
                {t.siteTitle}
              </h1>
              {userName && (
                <span className={`text-xs sm:text-sm ${darkMode ? 'text-green-300' : 'text-green-600'}`}>
                  {t.welcome}{userName}
                </span>
              )}
            </div>
            <div className="flex items-center gap-2">
              <a
                href="https://discord.gg/rs7uy2wkkB"
                target="_blank"
                rel="noopener noreferrer"
                className={`flex items-center gap-1 px-3 py-1 rounded-full text-xs sm:text-sm font-bold transition-colors ${
                  darkMode ? 'bg-indigo-600 hover:bg-indigo-700 text-white' : 'bg-indigo-500 hover:bg-indigo-600 text-white'
                }`}
              >
                <svg className="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189Z"/></svg>
                {t.discord}
              </a>
              <div className={`flex rounded-lg overflow-hidden border text-xs sm:text-sm font-semibold ${darkMode ? 'border-green-500/50' : 'border-green-600/50'}`}>
                <button
                  onClick={() => setLang('en')}
                  className={`px-3 py-1 ${lang === 'en' ? (darkMode ? 'bg-green-500/20 text-green-400' : 'bg-green-100 text-green-800') : (darkMode ? 'text-gray-400' : 'text-gray-500')}`}
                >
                  EN
                </button>
                <button
                  onClick={() => setLang('ar')}
                  className={`px-3 py-1 ${lang === 'ar' ? (darkMode ? 'bg-green-500/20 text-green-400' : 'bg-green-100 text-green-800') : (darkMode ? 'text-gray-400' : 'text-gray-500')}`}
                >
                  AR
                </button>
              </div>
              <button
                onClick={() => setDarkMode(!darkMode)}
                className={`w-9 h-9 flex items-center justify-center rounded-full border text-lg ${darkMode ? 'border-green-500/40 text-yellow-300 bg-gray-800' : 'border-gray-300 text-gray-700 bg-white'}`}
                aria-label="Toggle dark/light mode"
              >
                {darkMode ? '☀️' : '🌙'}
              </button>
            </div>
          </header>

          <main className="flex-1 px-4 py-6 max-w-3xl mx-auto w-full space-y-8">
            {sections.map((sec, idx) => (
              <Section
                key={idx}
                title={sec.title}
                subtitle={sec.subtitle}
                darkMode={darkMode}
                index={idx}
              >
                {idx === 3 ? (
                  <ul className={`list-disc list-inside space-y-1 ${darkMode ? 'text-gray-200' : 'text-gray-700'}`}>
                    {sec.items.map((item, i) => (
                      <li key={i}>{item}</li>
                    ))}
                  </ul>
                ) : (
                  <>
                    <p className="mb-3">{sec.p1}</p>
                    <p className="mb-3">{sec.p2}</p>
                    <p>{sec.p3}</p>
                  </>
                )}
              </Section>
            ))}
          </main>

          <footer className={`text-center py-4 text-xs border-t ${darkMode ? 'border-green-500/20 text-gray-500' : 'border-green-600/20 text-gray-600'}`}>
            &copy; {new Date().getFullYear()} CyberSec Academy — Knowledge for Ethical Defense
          </footer>
        </div>
      );
    }

    const container = document.getElementById('root');
    if (container) {
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    }
  </script>
</body>
</html>
